        <!-- First Box -->

<div class="box image-box">

<script>
  // Encrypt Message Function
  async function encryptMessage() {
    const imageInput = document.getElementById('fileInput');
    const message = document.getElementById('message').value;
    const securityKey = document.getElementById('securityKey').value;

    if (!imageInput.files.length || !message) {
      alert('Please select an image and enter a message.');
      return;
    }

    const file = imageInput.files[0];
    const reader = new FileReader();

    reader.onload = function () {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const img = new Image();

      img.onload = function () {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        let messageToEncode = securityKey ? `${securityKey}:${message}` : message;
        messageToEncode += '\0'; // Null terminator to mark the end of the message

        for (let i = 0; i < messageToEncode.length; i++) {
          data[i * 4] = messageToEncode.charCodeAt(i); // Store message in red channel
        }

        ctx.putImageData(imageData, 0, 0);
        const stegoImage = canvas.toDataURL('image/png');

        const link = document.createElement('a');
        link.href = stegoImage;
        link.download = 'stego-image.png';
        link.click();
      };

      img.src = reader.result;
    };

    reader.readAsDataURL(file);
  }

  // Dark Mode Toggle
  document.getElementById("darkModeToggle").addEventListener("click", function () {
    document.body.classList.toggle("dark-mode");
  });

  // Hide/Show Button Logic
  document.getElementById("hideButton").addEventListener("click", function () {
    const action = document.getElementById("action");
    action.textContent = action.textContent.toLowerCase() === "encrypt" ? "decrypt" : "encrypt";
  });

  // File Input Logic
  // File Input Logic
const fileInput = document.getElementById("fileInput");
const fileNameDisplay = document.getElementById("fileName");
const dragDropArea = document.getElementById("dragDropArea");

// Handle the file input change
fileInput.addEventListener("change", function () {
  fileNameDisplay.textContent = fileInput.files[0]?.name || "No file selected";
});

// Handle drag and drop
dragDropArea.addEventListener("dragover", (e) => {
  e.preventDefault();
  dragDropArea.classList.add("drag-hover");
});

dragDropArea.addEventListener("dragleave", () => {
  dragDropArea.classList.remove("drag-hover");
});

dragDropArea.addEventListener("drop", (e) => {
  e.preventDefault();
  dragDropArea.classList.remove("drag-hover");
  fileInput.files = e.dataTransfer.files;
  fileNameDisplay.textContent = fileInput.files[0]?.name || "No file selected";
});

  // Toggle Password Visibility
  document.getElementById("togglePassword").addEventListener("click", function () {
    const passwordField = document.getElementById("securityKey");
    passwordField.type = passwordField.type === "password" ? "text" : "password";
  });

  // Drag-and-Drop Logic


dragDropArea.addEventListener("dragover", (e) => {
  e.preventDefault();
  dragDropArea.classList.add("drag-hover");
});

dragDropArea.addEventListener("dragleave", () => dragDropArea.classList.remove("drag-hover"));

dragDropArea.addEventListener("drop", (e) => {
  e.preventDefault();
  dragDropArea.classList.remove("drag-hover");

  // Handle the dropped file
  const files = e.dataTransfer.files;
  if (files.length > 0) {
    fileInput.files = files; // Assign dropped files to file input
    fileNameDisplay.textContent = files[0].name; // Display the file name
  } else {
    fileNameDisplay.textContent = "No file selected"; // Reset the file name display if no file is dropped
  }
});

</script>
