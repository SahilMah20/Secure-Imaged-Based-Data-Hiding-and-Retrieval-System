<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1d0033, #29004e, #3e005f);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      transition: background 0.5s ease-in-out;
      position: relative;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      
      position: absolute;
      top: 10%;
      width: 100%;
    }

    .logo {
      width: 100px; /* Adjust as needed */
      height: auto;
      position: relative;
      z-index: 1; /* Ensures logo stays behind text */
    }

    .glowing-text {
      font-size: 24px;
      color: #ffffff;
      text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 15px #ff00ff, 0 0 20px #ff00ff;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2; /* Ensures text is in front of the logo */
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 30px;
      width: 400px;
      text-align: center;
      box-shadow: 0 4px 30px rgba(255, 0, 255, 0.3);
      backdrop-filter: blur(12px);
      border: 2px solid rgba(255, 255, 255, 0.2);
      margin-top: 100px; /* Push the container down */
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      text-transform: uppercase;
      color: #ff00ff;
    }

    .input-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid transparent;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: all 0.3s ease-in-out;
    }

    input:focus {
      border: 2px solid #ff00ff;
      box-shadow: 0 0 15px #ff00ff;
    }

    .btn {
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      background: linear-gradient(135deg, #ff00ff, #cc00ff);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
      position: relative;
      overflow: hidden;
      width: 100%;
    }

    .btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.3);
      transition: all 0.4s ease-in-out;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff;
    }

    /* Google Button Styling */
    .google-btn-container {
      display: flex;
      justify-content: center;
      margin-top: 15px;
    }

    .google-btn {
      background: white;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: bold;
      border-radius: 8px;
      padding: 12px;
      width: 100%;
      max-width: 250px;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
    }

    .google-btn img {
      width: 20px;
      height: 20px;
    }

    .google-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
    }

    .toggle-mode {
      margin-top: 20px;
      background: none;
      color: #ff00ff;
      font-size: 14px;
      cursor: pointer;
      transition: color 0.3s ease-in-out;
      border: none;
      outline: none;
    }

    .toggle-mode:hover {
      color: #fff;
      text-decoration: underline;
    }

    /* DARK MODE */
    body.dark-mode {
      background: linear-gradient(135deg, #000000, #1a1a1a);
    }

    body.dark-mode .container {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    body.dark-mode h1 {
      color: #ff007f;
    }

    body.dark-mode .btn {
      background: linear-gradient(135deg, #ff007f, #ff5500);
      box-shadow: 0 0 10px #ff007f, 0 0 20px #ff5500;
    }

    body.dark-mode .btn:hover {
      box-shadow: 0 0 15px #ff007f, 0 0 30px #ff5500;
    }

    body.dark-mode .google-btn {
      background: #222;
      color: #fff;
    }
  </style>
</head>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, sendEmailVerification, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCRVSCEg4K2zHFPUmDa-RC4x0gb4fP6ZSY",
  authDomain: "stegno-99a66.firebaseapp.com",
  databaseURL: "https://stegno-99a66-default-rtdb.firebaseio.com",
  projectId: "stegno-99a66",
  storageBucket: "stegno-99a66.firebasestorage.app",
  messagingSenderId: "70303576485",
  appId: "1:70303576485:web:9b2d572ee740b7ce66f84c",
  measurementId: "G-YJKGBP1M2M"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const submitButton = document.getElementById("submit");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

// Create User with Email/Password
submitButton.addEventListener("click", () => {
  const email = emailInput.value;
  const password = passwordInput.value;

  createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      // Send email verification
      sendEmailVerification(userCredential.user)
        .then(() => {
          // Show the popup asking the user to check email and click the verification link
          showVerificationPopup();
          // Redirect to index.html
          window.location.href = '../Action/Instruction.html';
        })
        .catch((error) => {
          alert("Error occurred while sending verification email: " + error.message);
        });
    })
    .catch((error) => {
      alert("Error occurred during sign-up: " + error.message);
    });
});

// Show Verification Popup
function showVerificationPopup() {
  const popup = document.createElement("div");
  popup.id = "verificationPopup";
  popup.innerHTML = `
    <div style="background-color: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);">
      <h2>Email Verification</h2>
      <p>Please check your email inbox and click on the verification link to verify your account.</p>
      <button onclick="closeVerificationPopup()">Got it!</button>
    </div>
  `;
  popup.style.position = "fixed";
  popup.style.top = "50%";
  popup.style.left = "50%";
  popup.style.transform = "translate(-50%, -50%)";
  popup.style.zIndex = "1000";
  document.body.appendChild(popup);
}

// Close the Verification Popup
function closeVerificationPopup() {
  const popup = document.getElementById("verificationPopup");
  if (popup) {
    popup.remove();
  }
}

// Track the user's authentication state to ensure email verification
auth.onAuthStateChanged((user) => {
  if (user) {
    // Check if email is verified
    if (user.emailVerified) {
      // User is verified, allow login and redirect to dashboard
      alert("Your email is verified! Proceeding to dashboard.");
      window.location.href = "dashboard.html"; // Redirect to your desired page
    } else {
      // Email not verified, inform user to check their inbox
      alert("Please verify your email first.");
    }
  }
});

document.getElementById("dark-mode-toggle").addEventListener("click", () => {
    console.log("Dark mode toggle clicked");
    document.body.classList.toggle("dark-mode");
});
  
    </script>
